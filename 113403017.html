<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Table</title>

<style>
table, th, td{
    border: 1px solid black;
    border-collapse: collapse;
}

th, td{
    padding: 5px;
    text-align: left;
}
</style>

</head>

<body>

<table>
    <tr>
        <th>Name</th>
        <th>Student ID</th>
    </tr>
    <tr>
        <td>賴韋衡</td>
        <td>113403017</td>
    </tr>
</table>

</body>
</html>
